    <script>
        function showMessage(message, type = 'danger') {
            const msgDiv = document.getElementById('message');
            const icon = type === 'success' ? 'check-circle' : 'exclamation-circle';
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            msgDiv.innerHTML = `<div class="alert ${alertClass}"><i class="fas fa-${icon}"></i> ${message}</div>`;
        }

        // If redirected with a query error, show it in message box
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            if (error === 'invalid') showMessage('Invalid email or password.', 'danger');
            else if (error === 'missing') showMessage('Please fill in all fields.', 'danger');
            else if (error === 'unauthorized') showMessage('Please login to continue.', 'danger');
            else showMessage('Login failed. Please try again.', 'danger');

            // Remove parameter from URL for cleaner UX
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    </script>
