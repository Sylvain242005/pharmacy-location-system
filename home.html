                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>

    <script>
    // ===== YOUR EXACT JAVASCRIPT - KEPT 100% INTACT =====
    async function login(event) {
        event.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        
        if (!email || !password) {
            showMessage('Please fill all fields', 'danger');
            return;
        }
        
        // Show loading state
        loginBtn.disabled = true;
        btnText.innerHTML = ' Logging in...';
        
        try {
            const response = await fetch('login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                showMessage('Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    if (data.user.role === 'customer') {
                        window.location.href = 'customer/dashboard.php';
                    } else if (data.user.role === 'business_owner') {
                        window.location.href = 'business/dashboard.php';
                    } else if (data.user.role === 'admin') {
                        window.location.href = 'admin/dashboard.php';
                    }
                }, 1500);
            } else {
                showMessage(data.message, 'danger');
                loginBtn.disabled = false;
                btnText.innerHTML = 'Sign In';
            }
        } catch (error) {
            console.error('Login error:', error);
            showMessage('Login failed. Please try again.', 'danger');
            loginBtn.disabled = false;
            btnText.innerHTML = 'Sign In';
        }
    }

    function showMessage(message, type) {
        const msgDiv = document.getElementById('message');
        const icon = type === 'success' ? 'check-circle' : 'exclamation-circle';
        msgDiv.innerHTML = `<div class="alert alert-${type}"><i class="fas fa-${icon}"></i> ${message}</div>`;
    }
    </script>
